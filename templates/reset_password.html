<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - CCS Sit-in System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
    body {
        background-color: #f5f7fb;
        background-image:
            linear-gradient(rgba(15,62,125,0.08) 1px, transparent 1px),
            linear-gradient(90deg, rgba(15,62,125,0.08) 1px, transparent 1px);
        background-size: 20px 20px;
    }
    .register-card {
        background: rgba(255,255,255,0.55) !important;
        backdrop-filter: blur(24px) !important;
        border: 1px solid rgba(255,255,255,0.7) !important;
        box-shadow: 0 8px 32px rgba(15,62,125,0.15) !important;
        border-radius: 20px !important;
    }
    .form-field input {
        background: rgba(255,255,255,0.6) !important;
        border: 1.5px solid rgba(15,62,125,0.15) !important;
        border-radius: 10px !important;
    }
    .form-field input:focus {
        background: rgba(255,255,255,0.85) !important;
        border-color: #0F3E7D !important;
        box-shadow: 0 0 0 3px rgba(15,62,125,0.1) !important;
    }
    .btn-primary {
        background: linear-gradient(135deg, #1a5db5, #0F3E7D) !important;
        border-radius: 12px !important;
    }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <a href="/" class="logo-section" style="text-decoration:none;">
                <img src="{{ url_for('static', filename='images/ucmainccslogo.jpg') }}"
                     alt="CCS Logo" class="navbar-logo">
                <span class="site-title">College of Computer Studies Sit-in Monitoring System</span>
            </a>
        </div>
    </nav>

    <main class="register-container">
        <div class="register-card">
            <div class="form-content">
                <h1>Reset Password</h1>
                <p class="form-subtitle">Enter your new password below</p>

                {% if error %}
                <div class="error-message">⚠️ {{ error }}</div>
                {% endif %}

                <form action="/reset-password/{{ token }}" method="post">
                    <div class="form-field">
                        <label for="newPassword">New Password</label>
                        <input type="password" id="newPassword" name="newPassword"
                               required minlength="6"
                               placeholder="Enter new password">
                    </div>
                    <div class="form-field">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" name="confirmPassword"
                               required minlength="6"
                               placeholder="Confirm new password">
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">
                        Reset Password
                    </button>
                    <p class="form-footer">
                        <a href="/login">← Back to Login</a>
                    </p>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 College of Computer Studies - University of Cebu</p>
    </footer>
</body>
</html>
